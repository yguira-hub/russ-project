apiVersion: apps/v1
kind: Deployment
metadata:
  name: russ-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: russ-app
  template:
    metadata:
      labels:
        app: russ-app
    spec:
      containers:
      - name: app
        image: youssraguira/russ-project:latest
        ports:
        - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: russ-app
spec:
  type: NodePort
  selector:
    app: russ-app
  ports:
  - port: 8000
    targetPort: 8000
    nodePort: 32001
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: russ-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: russ-frontend
  template:
    metadata:
      labels:
        app: russ-frontend
    spec:
      containers:
      - name: frontend
        image: youssraguira/russ-frontend:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: russ-frontend
spec:
  type: NodePort
  selector:
    app: russ-frontend
  ports:
  - port: 80
    targetPort: 80
    nodePort: 32003
