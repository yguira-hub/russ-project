apiVersion: apps/v1
kind: Deployment
metadata:
  name: russ-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: russ-app
  template:
    metadata:
      labels:
        app: russ-app
    spec:
      containers:
      - name: app
        image: youssraguira/russ-project:latest
        ports:
        - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: russ-app
spec:
  type: NodePort
  selector:
    app: russ-app
  ports:
  - port: 8000
    targetPort: 8000
    nodePort: 32001
