<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DevOps Portfolio</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #0f172a; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
    .card { background: #1e293b; border-radius: 16px; padding: 40px; text-align: center; max-width: 500px; width: 90%; box-shadow: 0 0 40px rgba(99,102,241,0.3); }
    h1 { font-size: 2rem; margin-bottom: 10px; color: #818cf8; }
    .badge { display: inline-block; background: #22c55e; color: white; padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; margin: 10px 0 20px; }
    .info { background: #0f172a; border-radius: 10px; padding: 20px; margin-top: 20px; text-align: left; }
    .info p { margin: 8px 0; color: #94a3b8; }
    .info span { color: #22c55e; font-weight: bold; }
    button { margin-top: 20px; background: #6366f1; color: white; border: none; padding: 12px 30px; border-radius: 8px; cursor: pointer; font-size: 1rem; }
    button:hover { background: #4f46e5; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🚀 DevOps Portfolio</h1>
    <span class="badge">● LIVE</span>
    <p style="color:#94a3b8">Running on Kubernetes K3s cluster</p>
    <div class="info" id="data">
      <p>📦 <span>Message:</span> Hello from DevOps Portfolio!</p>
      <p>✅ <span>Status:</span> running</p>
      <p>👤 <span>Author:</span> youssraguira</p>
      <p>🏗️ <span>Platform:</span> Kubernetes K3s (3 nodes)</p>
      <p>🔧 <span>Stack:</span> FastAPI + ArgoCD + Jenkins + Grafana</p>
      <p>🐳 <span>Registry:</span> Docker Hub</p>
      <p>📊 <span>Monitoring:</span> Prometheus + Grafana</p>
    </div>
    <button onclick="window.location.reload()">🔄 Refresh</button>
  </div>
</body>
</html>
